name: api-drift

# Every ~48h, check that the endpoint paths the exporter uses still exist in
# Lysa's public web-app bundle. On drift, open an issue so the exporter can be
# updated before a user hits a broken export. The check is unauthenticated — it
# only fetches app.lysa.se — so it needs no secrets.

on:
  schedule:
    - cron: '17 6 */2 * *' # 06:17 UTC on odd days of the month (~every 48h)
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run API-drift check
        id: check
        run: |
          set +e
          report="$(go run . -check 2>&1)"
          code=$?
          set -e
          echo "$report"
          echo "code=$code" >> "$GITHUB_OUTPUT"
          {
            echo 'report<<REPORT_EOF'
            echo "$report"
            echo 'REPORT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Open issue on drift
        if: steps.check.outputs.code == '2'
        env:
          GH_TOKEN: ${{ github.token }}
          REPORT: ${{ steps.check.outputs.report }}
        run: |
          gh label create api-drift --color FBCA04 \
            --description "Lysa API surface changed; exporter may need updating" --force || true
          if [ "$(gh issue list --label api-drift --state open --json number --jq 'length')" != "0" ]; then
            echo "An open api-drift issue already exists — skipping."
            exit 0
          fi
          body="$(printf 'The scheduled API-drift check found endpoint paths the exporter uses that are no longer present in the public Lysa web-app bundle (`app.lysa.se`). The exporter likely needs updating.\n\n```\n%s\n```\n\nAutomated by `.github/workflows/api-drift.yml` — re-run from the Actions tab.' "$REPORT")"
          gh issue create \
            --title "Lysa API drift detected — exporter may need updating" \
            --label api-drift \
            --body "$body"
